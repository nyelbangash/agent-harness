# Copy to ops/policy.yaml and edit. The live file is gitignored (it names your
# repos and budgets) and hot-reloads while the harness is running.
mode: plan_only # plan_only | full_auto | paused — flippable from Mission Control
models:
  triage: sonnet
  implement: sonnet
  plan: sonnet
  ideate: sonnet
  critique: opus
  escalation: opus
schedule:
  full_auto_windows: ["20:00-06:00"] # local time; outside these, auto lane demotes to plan
  ideation_windows: ["21:00-02:00"]
  max_ideation_sessions_per_week: 3
budgets:
  opus_hours_weekly_cap: 18
  overflow_usd_weekly_cap: 25 # hard stop on API-rate overflow spend
  implement_max_turns: 60
  ideate_iteration_max_turns: 25
  triage_max_turns: 12
  plan_max_turns: 40
utilization_gates: # polled from https://claude.ai/api/oauth/usage
  poll_minutes: 10
  full_auto_below: 0.60 # weekly (seven_day) utilization thresholds
  defer_ideation_above: 0.60
  plan_only_above: 0.80
  pause_above: 0.90
triage:
  auto_threshold: 0.75
  low_confidence_floor: 0.4 # below this, a second opus triage pass runs
plan:
  post_to_issue: false
implement:
  max_fix_cycles: 2
review:
  max_rounds: 1
  confidence_floor: 0.7
  model: opus
  fix_model: sonnet
  rebase_max_attempts: 2
ideate:
  critique_every: 5
  default_budget_minutes: 180
github:
  repos: [] # "owner/name" or {name: "owner/name", test_command: "mix test"} — the auto lane needs a test command
  poll_minutes: 2
notify:
  macos: true # osascript banner
  ntfy_topic: null # e.g. "harness-<random-suffix>" for phone push via ntfy.sh
  budget_warn_fraction: 0.80 # notify when a weekly cap crosses this
billing_model: subscription_pool # subscription_pool | sdk_credit
calendar_notes: [] # dated reminders surfaced in Mission Control, e.g. "2026-08-01: quota change"
